# Monitor
monitor=,preferred,auto,1

# Terminal
$terminal = kitty

# FileManager
#$filemanager = Dolphin

# Launcher
# $menu = wofi --show drun
$menu = wofi --show drun --allow-images

# Tecla principal
$mainMod = SUPER

# Atajos básicos
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, D, exec, $menu
#bind = $mainMod, E, $filemanager

# Movimiento entre ventanas
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Autostart
exec-once = waybar
exec-once = mako
# exec-once = swaybg -i /ruta/a/tu/wallpaper.jpg -m fill
# exec-once = swaybg -i ~/wallpapers/wallpaper_gris.jpg -m fill
exec-once = swaybg -i ~/projects/hyprland-rvh/assets/wallpapers/tu_imagen.jpg -m fill

# Workspaces (1–5)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Mover ventanas a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

bind = $mainMod, R, exec, hyprctl reload

# Movimiento estilo WASD
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Teclado en español
input {
    kb_layout = es, us
    kb_options = grp:alt_shift_toggle
}

# Reglas de aplicaciones → workspaces

# Navegador → workspace 1
windowrulev2 = workspace 1, class:^(Brave-browser)$

# Terminal → workspace 2
windowrulev2 = workspace 2, class:^(kitty)$

# Editor (ej. code) → workspace 3
windowrulev2 = workspace 3, class:^(code)$

# Resize ventanas
bind = $mainMod SHIFT, H, resizeactive, -50 0
bind = $mainMod SHIFT, L, resizeactive, 50 0
bind = $mainMod SHIFT, K, resizeactive, 0 -50
bind = $mainMod SHIFT, J, resizeactive, 0 50

# Toggle floating
bind = $mainMod, F, togglefloating
bind = $mainMod, SPACE, fullscreen
bind = $mainMod, C, exec, kitty -e nano ~/hypr-cheatsheet.txt

# Estilo de ventanas
general {
    border_size = 2
    col.active_border = rgba(89b4faee)
    col.inactive_border = rgba(313244aa)
}
